<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — NeuralGATE</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 24px; }
    .auth-card { width: 100%; max-width: 480px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 44px; position: relative; overflow: hidden; }
    .auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--violet), var(--green)); }
    .auth-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .auth-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-switch { text-align: center; font-size: 14px; color: var(--text-secondary); margin-top: 20px; }
    .auth-switch a { color: var(--violet-light); font-weight: 600; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    #reg-error, #reg-success { display: none; }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>

  <a href="index.html" style="position:fixed; top:20px; left:24px; display:flex; align-items:center; gap:8px; font-family:var(--font-head); font-weight:800; font-size:18px; z-index:100;">
    <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--violet),var(--green));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;">🧠</div>
    Neural<span style="color:var(--violet-light)">GATE</span>
  </a>

  <div class="auth-page">
    <div class="auth-card animate-fade-up">
      <div class="auth-title">Join NeuralGATE 🚀</div>
      <div class="auth-subtitle">Create your free student account and start your GATE 2027 journey.</div>

      <div id="reg-error" class="alert alert-error mb-4"><span>⚠</span><span id="reg-error-text"></span></div>
      <div id="reg-success" class="alert alert-success mb-4"><span>✓</span><span>Account created! Redirecting to dashboard...</span></div>

      <form class="auth-form" id="reg-form">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" id="fname" class="form-input" placeholder="Rahul" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" id="lname" class="form-input" placeholder="Sharma" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@college.com" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Branch</label>
            <select id="branch" class="form-select form-input" required>
              <option value="">Select</option>
              <option value="CSE">CSE</option>
              <option value="ECE">ECE</option>
              <option value="ME">ME</option>
              <option value="EE">EE</option>
              <option value="CE">CE</option>
              <option value="CH">CH</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Target Year</label>
            <select id="gateyear" class="form-select form-input" required>
              <option value="2027">GATE 2027</option>
              <option value="2028">GATE 2028</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required minlength="6">
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-input" placeholder="Repeat password" required>
        </div>

        <div style="display:flex;gap:8px;align-items:flex-start;margin-top:4px;">
          <input type="checkbox" id="terms" style="margin-top:3px; accent-color:var(--violet);" required>
          <label for="terms" style="font-size:13px; color:var(--text-secondary); cursor:pointer;">
            I agree to the <a href="#" style="color:var(--violet-light)">Terms of Use</a> — I'm a genuine GATE aspirant using this platform for preparation.
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="padding:13px; margin-top:6px;">Create My Account →</button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Log in here</a>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    if (GV.getUser()) window.location.href = 'dashboard.html';

    document.getElementById('reg-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const errEl = document.getElementById('reg-error');
      const errText = document.getElementById('reg-error-text');
      errEl.style.display = 'none';

      const fname = document.getElementById('fname').value.trim();
      const lname = document.getElementById('lname').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const branch = document.getElementById('branch').value;
      const gateYear = document.getElementById('gateyear').value;
      const password = document.getElementById('password').value;
      const confirmPwd = document.getElementById('confirm-password').value;

      if (password !== confirmPwd) {
        errEl.style.display = 'flex';
        errText.textContent = 'Passwords do not match.';
        return;
      }

      const users = JSON.parse(localStorage.getItem('gv_all_users') || '[]');
      if (users.find(u => u.email === email)) {
        errEl.style.display = 'flex';
        errText.textContent = 'This email is already registered. Please log in.';
        return;
      }

      const newUser = {
        id: 'u' + Date.now(),
        name: fname + ' ' + lname,
        email,
        password,
        branch,
        gateYear,
        joinedAt: new Date().toISOString()
      };

      users.push(newUser);
      localStorage.setItem('gv_all_users', JSON.stringify(users));
      GV.setUser(newUser);

      document.getElementById('reg-success').style.display = 'flex';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    });
  </script>
</body>
</html>
