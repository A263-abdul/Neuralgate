<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NeuralGATE</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 44px;
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--violet), var(--green));
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 32px;
    }

    .auth-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--violet), var(--green));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .auth-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .auth-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }

    .auth-form { display: flex; flex-direction: column; gap: 18px; }

    .form-input-wrap {
      position: relative;
    }

    .form-input-wrap .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-muted);
    }

    .form-input-wrap .form-input {
      padding-left: 42px;
    }

    .auth-divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      position: relative;
      margin: 4px 0;
    }

    .auth-divider::before, .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border-subtle);
    }

    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }

    .auth-switch {
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 20px;
    }

    .auth-switch a { color: var(--violet-light); font-weight: 600; }
    .auth-switch a:hover { text-decoration: underline; }

    #auth-error { display: none; }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>
  
  <a href="index.html" style="position:fixed; top:20px; left:24px; display:flex; align-items:center; gap:8px; font-family:var(--font-head); font-weight:800; font-size:18px; z-index:100;">
    <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--violet),var(--green));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;">🧠</div>
    Neural<span style="color:var(--violet-light)">GATE</span>
  </a>

  <div class="auth-page">
    <div class="auth-card animate-fade-up">
      <div class="auth-title">Welcome back 👋</div>
      <div class="auth-subtitle">Log in to continue your GATE preparation journey.</div>
      
      <div id="auth-error" class="alert alert-error mb-4">
        <span>⚠</span>
        <span id="auth-error-text">Invalid email or password.</span>
      </div>

      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="form-input-wrap">
            <span class="input-icon">✉</span>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="form-input" placeholder="Your password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="padding:13px;">Login to NeuralGATE →</button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>

      <!-- Demo hint -->
      <div style="margin-top:24px; background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2); border-radius:var(--radius-md); padding:12px 16px; font-size:13px;">
        <strong style="color:var(--green)">Demo credentials:</strong><br>
        <span style="color:var(--text-secondary)">Email: demo@gate.com | Password: gate2027</span>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    // Seed demo user if not exists
    const allUsers = JSON.parse(localStorage.getItem('gv_all_users') || '[]');
    if (!allUsers.find(u => u.email === 'demo@gate.com')) {
      allUsers.push({ id: 'demo1', name: 'Demo Student', email: 'demo@gate.com', password: 'gate2027', branch: 'CSE', gateYear: '2027' });
      localStorage.setItem('gv_all_users', JSON.stringify(allUsers));
    }

    // Redirect if already logged in
    if (GV.getUser()) window.location.href = 'dashboard.html';

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      const users = JSON.parse(localStorage.getItem('gv_all_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        GV.setUser(user);
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('auth-error').style.display = 'flex';
        document.getElementById('auth-error-text').textContent = 'Invalid email or password. Check demo credentials above.';
      }
    });
  </script>
</body>
</html>
